name: Course Enrollment API Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1-5'   # Run every weekday at 8am UTC

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run API tests
        env:
          STUDENT_EMAIL:      ${{ secrets.STUDENT_EMAIL }}
          STUDENT_PASSWORD:   ${{ secrets.STUDENT_PASSWORD }}
          INSTRUCTOR_EMAIL:   ${{ secrets.INSTRUCTOR_EMAIL }}
          INSTRUCTOR_PASSWORD: ${{ secrets.INSTRUCTOR_PASSWORD }}
        run: mvn test

      - name: Generate Allure report
        if: always()
        run: mvn allure:report

      - name: Upload Allure report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: allure-report
          path: target/site/allure-maven-plugin/

      - name: Upload Surefire results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: surefire-results
          path: target/surefire-reports/
